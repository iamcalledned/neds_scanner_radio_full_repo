<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0b0f19] text-slate-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Scanner Archive</title>

  <meta name="description" content="Archived scanner radio calls — Hopedale, Milford, Bellingham, Mendon, Upton, Blackstone, Franklin.">
  <meta name="theme-color" content="#0b0f19">

  <link rel="manifest" href="/scanner/manifest.json?v=v20260330">
  <link rel="icon" type="image/x-icon" href="/scanner/static/icons/favicon.ico">
  <link rel="apple-touch-icon" href="/scanner/static/icons/icon-192x192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Scanner">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pd: '#1e3a8a', // Police Blue
            fd: '#7f1d1d', // Fire Red
            bg: '#0b0f19', // Background Dark Blue
            scannerBlue: '#38bdf8' // Accent Sky Blue
          },
          fontFamily: { sans: ['Inter','sans-serif'] }
        }
      }
    };
  </script>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  
  <script src="/scanner/static/js/scanner_app_new.js?v=v20260330" defer></script>
  
  <script src="/scanner/static/js/scanner_archive.js?v=v20260330" defer></script>


  <style>
    .main-content-area::-webkit-scrollbar { width: 6px; }
    .main-content-area::-webkit-scrollbar-track { background: #1e293b; }
    .main-content-area::-webkit-scrollbar-thumb { background: #475569; }

    /* === Menu dropdown === */
    .menu-item {
      display:block; padding:0.5rem 1rem;
      color:#cbd5e1; font-size:0.875rem;
      transition:background .15s,color .15s;
    }
    .menu-item:hover { background:#1e293b; color:#38bdf8; }
  </style>
</head>

<body class="flex flex-col h-full text-slate-100 font-sans selection:bg-blue-600 selection:text-white">
  <header class="sticky top-0 z-50 bg-[#0b0f19]/95 backdrop-blur-md border-b border-slate-800 shadow" style="padding-top: env(safe-area-inset-top);">
  <div class="max-w-6xl mx-auto flex items-center justify-between h-16 px-4">

    <div class="flex items-center gap-2">
      <h1 class="text-lg font-semibold text-white tracking-tight gap-2">
        <a href="/scanner/" class="flex items-center gap-2 hover:text-slate-300 transition-colors">
          <img src="/scanner/static/icons/logo-header.png" alt="Ned's Scanner Network" class="h-9 w-auto">
          <span class="hidden sm:inline">Ned's Scanner Network</span>
        </a>
      </h1>
    </div>

    <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-300">
      <div class="flex items-center gap-1.5" title="Live listeners">
        <span class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_#ef4444]"></span>
        <span id="ws-user-count">-- listeners</span>
      </div>
    </div>

    <div class="relative">
      <button id="menu-btn"
        class="flex items-center gap-2 px-3 py-1.5 rounded-md border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition">
        Menu
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div id="menu-dropdown"
        class="hidden absolute right-0 mt-2 w-48 bg-[#111827] border border-slate-700 rounded-lg shadow-xl py-2">
        <a href="/scanner/" class="menu-item">Home</a>
        <a href="/scanner/today" class="menu-item">Today</a>
        <a href="/scanner/archive" class="menu-item">Archive</a>
        <a href="/scanner/stats" class="menu-item">Stats</a>
        <div class="border-t border-slate-700 my-1"></div>
        <div id="auth-status-button"></div>
      </div>
    </div>
  </div>
</header>

  <main class="flex-1 overflow-y-auto main-content-area pb-16">
    <div class="max-w-3xl mx-auto p-4 space-y-8">
      <div id="page-header" class="text-center">
        <h1 id="archive-title" class="text-3xl font-bold mb-1">📁 Scanner Archive</h1>
        <p id="archive-subtitle" class="text-gray-400 text-sm"></p>
      </div>

      <div id="archive-container" class="space-y-6">
        <p class="text-gray-500 text-center">Loading archive...</p>
      </div>
    </div>
  </main>

  </body>
</html>

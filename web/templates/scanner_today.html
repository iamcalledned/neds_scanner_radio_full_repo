<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0b0f19] text-slate-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Today's Calls – Ned’s Scanner Network</title>

  <meta name="description" content="All scanner calls recorded today across Hopedale, Milford, Franklin, and more.">
  <meta name="theme-color" content="#0b0f19">
  <link rel="manifest" href="/scanner/manifest.json?v=v20260331c">
  <link rel="icon" type="image/x-icon" href="/scanner/static/icons/favicon.ico">
  <link rel="apple-touch-icon" href="/scanner/static/icons/icon-192x192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Scanner">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pd: '#1e3a8a', // Police Blue
            fd: '#7f1d1d', // Fire Red
            bg: '#0b0f19', // Background Dark Blue
            scannerBlue: '#38bdf8' // Accent Sky Blue
          },
          fontFamily: { sans: ['Inter','sans-serif'] }
        }
      }
    }
  </script>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script src="/scanner/static/js/scanner_app_new.js?v=v20260331c" defer></script>
  <script src="/scanner/static/js/scanner_today.js?v=v20260331c" defer></script>

  <style>
    .glass { background: rgba(17,24,39,0.85); backdrop-filter: blur(12px); }
    .main-content-area::-webkit-scrollbar { width: 6px; }
    .main-content-area::-webkit-scrollbar-track { background: #1e293b; }
    .main-content-area::-webkit-scrollbar-thumb { background: #475569; }
    .main-content-area::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Styles for live indicator dots */
    .live-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #64748b; /* slate-500 */
      display: inline-block;
      margin-right: 6px;
      transition: background-color 0.3s ease;
      vertical-align: middle;
    }
    .live-indicator.live {
      background-color: #ef4444; /* red-500 */
      animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      box-shadow: 0 0 5px #ef4444, 0 0 8px #f87171; /* red-400 glow */
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

        /* === Menu dropdown === */
    .menu-item {
      display:block; padding:0.5rem 1rem;
      color:#cbd5e1; font-size:0.875rem;
      transition:background .15s,color .15s;
    }
    .menu-item:hover { background:#1e293b; color:#38bdf8; }

  </style>
</head>

<body class="flex flex-col h-full font-sans selection:bg-slate-600/40 selection:text-white">

<header class="sticky top-0 z-50 bg-[#0b0f19]/95 backdrop-blur-md border-b border-slate-800 shadow" style="padding-top: env(safe-area-inset-top);">
  <div class="max-w-6xl mx-auto flex items-center justify-between h-16 px-4">

    <h1 class="text-lg font-semibold text-white tracking-tight shrink-0">
      <a href="/scanner/" class="flex items-center gap-2 hover:text-slate-300 transition-colors">
        <img src="/scanner/static/icons/logo-header.png" alt="Ned's Scanner Network" class="h-9 w-auto">
        <span class="hidden sm:inline">Ned's Scanner Network</span>
      </a>
    </h1>

    <nav class="hidden md:flex items-center gap-1 text-sm font-medium">
      <a href="/scanner/" class="px-3 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/60 transition">Home</a>
      <a href="/scanner/today" class="px-3 py-1.5 rounded-md text-white bg-slate-800 transition">Today</a>
      <a href="/scanner/archive" class="px-3 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/60 transition">Archive</a>
      <a href="/scanner/stats"   class="px-3 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/60 transition">Stats</a>
      <a href="/scanner/heatmap" class="px-3 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/60 transition">Heat Map</a>
    </nav>

    <div class="relative flex items-center gap-2">
      <div class="hidden md:flex items-center gap-1.5 text-sm text-slate-400" title="Live listeners">
        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_#ef4444]"></span>
        <span id="ws-user-count">--</span>
      </div>
      <button id="menu-btn"
        class="md:hidden flex items-center gap-2 px-3 py-1.5 rounded-md border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition">
        Menu
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div id="menu-dropdown"
        class="hidden absolute right-0 top-full mt-2 w-48 bg-[#111827] border border-slate-700 rounded-lg shadow-xl py-2">
        <a href="/scanner/" class="menu-item">Home</a>
        <a href="/scanner/today" class="menu-item">Today</a>
        <a href="/scanner/archive" class="menu-item">Archive</a>
        <a href="/scanner/stats"   class="menu-item">Stats</a>
        <a href="/scanner/heatmap" class="menu-item">Heat Map</a>
        <div class="border-t border-slate-700 my-1"></div>
        <div id="auth-status-button" class="menu-item"></div>
      </div>
    </div>
  </div>
</header>

  <main class="flex-1 overflow-y-auto main-content-area bg-[#0b0f19] pb-16">
    <div class="max-w-3xl mx-auto p-4 space-y-8"> 
      
      <h1 class="text-3xl font-bold text-center">Today's Calls</h1>

      <section id="live-status-section" class="glass rounded-lg border border-slate-800 p-4">
        <h2 class="text-sm font-semibold uppercase text-slate-400 tracking-wider mb-3">Live Status</h2>
        <div id="live-status-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-2 text-sm">
          <p class="text-slate-500 italic col-span-full">Loading live statuses...</p> 
        </div>
      </section>

      <section id="calls-container" class="space-y-6">
         <p class="text-slate-500 italic text-center py-10">Loading today's calls...</p>
         </section>

    </div>
  </main>


</body>
</html>

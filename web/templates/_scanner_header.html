<header class="scanner-topbar">
  <div class="scanner-topbar-inner max-w-6xl mx-auto flex items-center justify-between gap-4 px-4">
    <div class="shrink-0">
      <a href="/scanner/" class="scanner-brand group flex items-center gap-3 transition-colors">
        <img
          src="/scanner/static/icons/logo-header.png"
          alt="Ned's Scanner Network"
          class="scanner-brand-mark h-10 w-auto rounded-full object-contain"
        >
        <div class="min-w-0">
          <div class="scanner-brand-name text-white text-lg font-semibold leading-tight">
            Ned's Scanner Network
          </div>
          <div class="scanner-brand-meta hidden sm:block text-[0.65rem] uppercase tracking-[0.28em]">
            Live radio, archive, and review
          </div>
        </div>
      </a>
    </div>

    <nav class="hidden md:flex items-center gap-2 text-sm font-medium">
      <a href="/scanner/" class="scanner-nav-link px-3 py-2 {{ 'scanner-nav-link-active' if active_page == 'home' else '' }}">Home</a>
      <a href="/scanner/archive" class="scanner-nav-link px-3 py-2 {{ 'scanner-nav-link-active' if active_page == 'archive' else '' }}">Archive</a>
      <a href="/scanner/stats" class="scanner-nav-link px-3 py-2 {{ 'scanner-nav-link-active' if active_page == 'stats' else '' }}">Stats</a>
      <a href="/scanner/heatmap" class="scanner-nav-link px-3 py-2 {{ 'scanner-nav-link-active' if active_page == 'heatmap' else '' }}">Heat Map</a>
      <a href="/scanner/training" class="scanner-nav-link px-3 py-2 {{ 'scanner-nav-link-active' if active_page == 'training' else '' }}">Training</a>
      <a href="/scanner/review" class="scanner-nav-link px-3 py-2 {{ 'scanner-nav-link-active' if active_page == 'review' else '' }}">Review</a>
      <button type="button" data-ask-ned-open class="scanner-nav-link px-3 py-2">Ask Ned</button>
    </nav>

    <div class="relative flex items-center gap-2">
      <div class="scanner-status-pill hidden lg:flex text-sm" title="Live listeners">
        <span class="scanner-status-dot"></span>
        <span id="ws-user-count">--</span>
      </div>

      <button id="push-btn"
        style="display:none"
        class="scanner-action-btn text-sm"
        title="Enable push notifications">
        <span aria-hidden="true">🔕</span>
      </button>

      <button id="install-btn"
        class="scanner-action-btn hidden text-sm">
        <span>Install</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16" />
        </svg>
      </button>

      <button id="notif-settings-btn"
        class="scanner-action-btn hidden md:inline-flex text-sm"
        title="Notification settings">
        <span aria-hidden="true">🔔</span>
        <span class="hidden lg:inline">Alerts</span>
      </button>

      <button id="menu-btn"
        class="scanner-action-btn md:hidden text-sm">
        <span>Menu</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <div id="menu-dropdown"
        class="scanner-menu-dropdown hidden absolute right-0 top-full mt-2 w-56 py-2">
        <a href="/scanner/" class="menu-item">Home</a>
        <a href="/scanner/archive" class="menu-item">Archive</a>
        <a href="/scanner/stats" class="menu-item">Stats</a>
        <a href="/scanner/heatmap" class="menu-item">Heat Map</a>
        <a href="/scanner/training" class="menu-item">Training Info</a>
        <a href="/scanner/review" class="menu-item">Review Edits</a>
        <button type="button" data-ask-ned-open class="menu-item text-left">Ask Ned</button>
        <div class="mx-3 my-1 border-t border-slate-800"></div>
        <button id="notif-settings-btn-mobile" class="menu-item text-left">Notifications</button>
        <div class="mx-3 my-1 border-t border-slate-800"></div>
        <div id="auth-status-button"></div>
      </div>
    </div>
  </div>
</header>

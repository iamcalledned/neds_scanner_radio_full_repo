<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0b0f19] text-slate-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ned’s Scanner Network</title>

  <meta name="description" content="Live and archived scanner radio feeds for each local town.">
  <meta name="theme-color" content="#0b0f19">

  <link rel="manifest" href="/scanner/manifest.json?v=v20260330">
  <link rel="icon" type="image/x-icon" href="/scanner/static/icons/favicon.ico">
  <link rel="apple-touch-icon" href="/scanner/static/icons/icon-192x192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Scanner">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FRCK642NXJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FRCK642NXJ');
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Socket.IO Client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['Roboto Mono', 'monospace'],
          },
          colors: {
            pd: '#1e3a8a',
            fd: '#7f1d1d',
            bg: '#0b0f19',
            scannerBlue: '#38bdf8',
          }
        },
      },
    };
  </script>

  <style>
    .pulse-live { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:.5;} }
    .main-content-area::-webkit-scrollbar { width:6px; }
    .main-content-area::-webkit-scrollbar-track { background:#1e293b; }
    .main-content-area::-webkit-scrollbar-thumb { background:#475569; }
    .main-content-area::-webkit-scrollbar-thumb:hover { background:#64748b; }
    /* === Menu dropdown styles (from scanner.html) === */
    .menu-item {
      display:block; padding:0.5rem 1rem;
      color:#cbd5e1; font-size:0.875rem;
      transition:background .15s,color .15s;
    }
    .menu-item:hover { background:#1e293b; color:#38bdf8; }

    .glass { background: rgba(17,24,39,0.85); backdrop-filter: blur(12px); }
  </style>
</head>

<body class="flex flex-col h-full overflow-hidden font-sans selection:bg-slate-600/40 selection:text-white">

<header class="sticky top-0 z-50 bg-[#0b0f19]/95 backdrop-blur-md border-b border-slate-800 shadow" style="padding-top: env(safe-area-inset-top);">
  <div class="max-w-6xl mx-auto flex items-center justify-between h-16 px-4">

    <h1 class="text-lg font-semibold text-white tracking-tight shrink-0">
      <a href="/scanner/" class="flex items-center gap-2 hover:text-slate-300 transition-colors">
        <img src="/scanner/static/icons/logo-header.png" alt="Ned's Scanner Network" class="h-9 w-auto">
        <span class="hidden sm:inline">Ned's Scanner Network</span>
      </a>
    </h1>

    <nav class="hidden md:flex items-center gap-1 text-sm font-medium">
      <a href="/scanner/" class="px-3 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/60 transition">Home</a>
      <a href="/scanner/today" class="px-3 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/60 transition">Today</a>
      <a href="/scanner/archive" class="px-3 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/60 transition">Archive</a>
      <a href="/scanner/stats" class="px-3 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800/60 transition">Stats</a>
    </nav>

    <div class="relative flex items-center gap-2">
      <div class="hidden md:flex items-center gap-1.5 text-sm text-slate-400" title="Live listeners">
        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_#ef4444]"></span>
        <span id="ws-user-count">--</span>
      </div>
      <button id="menu-btn"
        class="md:hidden flex items-center gap-2 px-3 py-1.5 rounded-md border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 transition">
        Menu
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div id="menu-dropdown"
        class="hidden absolute right-0 top-full mt-2 w-48 bg-[#111827] border border-slate-700 rounded-lg shadow-xl py-2">
        <a href="/scanner/" class="menu-item">Home</a>
        <a href="/scanner/today" class="menu-item">Today</a>
        <a href="/scanner/archive" class="menu-item">Archive</a>
        <a href="/scanner/stats" class="menu-item">Stats</a>
        <div class="border-t border-slate-700 my-1"></div>
        <div id="auth-status-button"></div>
      </div>
    </div>
  </div>
</header>

<main class="flex-1 overflow-y-auto main-content-area pb-20 bg-[#0b0f19]">
  <div class="max-w-4xl mx-auto p-4 space-y-6">

    <!-- Town header -->
    <div>
      <h2 id="town-title" class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-scannerBlue to-purple-400">
        Loading…
      </h2>
      <p class="text-slate-500 text-sm mt-1">Your front-row seat to local emergencies.</p>
    </div>

    <!-- Town-specific stats bar -->
    <div class="grid grid-cols-3 gap-3">
      <div class="bg-slate-900/60 rounded-xl p-4 text-center ring-1 ring-white/8">
        <p class="text-2xl font-bold text-scannerBlue" id="town-stat-today">--</p>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Calls Today</p>
      </div>
      <div class="bg-slate-900/60 rounded-xl p-4 text-center ring-1 ring-white/8">
        <p class="text-lg font-bold text-emerald-400 leading-tight" id="town-stat-last-active">--</p>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Last Active</p>
      </div>
      <div class="bg-slate-900/60 rounded-xl p-4 text-center ring-1 ring-white/8">
        <p class="text-lg font-bold text-amber-400 leading-tight" id="town-stat-most-active">--</p>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Most Active</p>
      </div>
    </div>

    <!-- Feed grid -->
    <section id="feed-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <noscript>
        <p class="text-center text-red-400 col-span-full">
          This page requires JavaScript to function. Please enable it in your browser.
        </p>
      </noscript>
    </section>

  </div>
</main>

<!-- === Existing app scripts === -->
<script src="/scanner/static/js/scanner_app_new.js?v=v20260330" defer></script>
<script src="/scanner/static/js/scanner_town.js?v=v20260330" defer></script>
</body>
</html>

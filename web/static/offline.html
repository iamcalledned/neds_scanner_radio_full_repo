<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline - Ned's Scanner Network</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 18%, rgba(56,189,248,.12) 0%, transparent 28%),
        linear-gradient(180deg, #09101d 0%, #050a14 100%);
      color: #e2e8f0;
      font-family: Inter, Arial, sans-serif;
      padding: 1.25rem;
    }
    .panel {
      width: min(30rem, 100%);
      border-radius: 1.25rem;
      border: 1px solid rgba(148,163,184,.16);
      background: rgba(15,23,42,.72);
      box-shadow: 0 24px 48px rgba(2,8,23,.45);
      padding: 1.5rem;
      text-align: center;
    }
    .eyebrow {
      margin: 0 0 .65rem;
      font-size: .7rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: #7dd3fc;
    }
    h1 {
      margin: 0 0 .7rem;
      font-size: 1.55rem;
    }
    p {
      margin: 0;
      color: #94a3b8;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin-top: 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(56,189,248,.3);
      background: rgba(2,132,199,.16);
      color: #e0f2fe;
      padding: .7rem 1rem;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="panel">
    <p class="eyebrow">Offline Mode</p>
    <h1>Scanner connection lost</h1>
    <p>Recent cached pages may still open, but live calls, stats, and archive requests need a connection. Reconnect when you're ready and jump back in.</p>
    <a href="/scanner/">Return to Scanner</a>
  </div>
</body>
</html>
